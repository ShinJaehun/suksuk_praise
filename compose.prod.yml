services:
  db:
    image: postgres:16
    container_name: suksuk_praise_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SUKSUK_PRAISE_DATABASE_NAME}
      POSTGRES_USER: ${SUKSUK_PRAISE_DATABASE_USER}
      POSTGRES_PASSWORD: ${SUKSUK_PRAISE_DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SUKSUK_PRAISE_DATABASE_USER} -d ${SUKSUK_PRAISE_DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/shinjaehun/suksuk_praise:latest
    container_name: suksuk_praise_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      FORCE_SSL: ${FORCE_SSL:-false}
      RAILS_LOG_LEVEL: ${RAILS_LOG_LEVEL:-info}
      RAILS_MAX_THREADS: ${RAILS_MAX_THREADS:-3}
      RAILS_MIN_THREADS: ${RAILS_MIN_THREADS:-3}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-1}
      PORT: ${PORT:-3000}
      SUKSUK_PRAISE_DATABASE_NAME: ${SUKSUK_PRAISE_DATABASE_NAME}
      SUKSUK_PRAISE_DATABASE_USER: ${SUKSUK_PRAISE_DATABASE_USER}
      SUKSUK_PRAISE_DATABASE_PASSWORD: ${SUKSUK_PRAISE_DATABASE_PASSWORD}
      SUKSUK_PRAISE_DATABASE_HOST: ${SUKSUK_PRAISE_DATABASE_HOST:-db}
      SUKSUK_PRAISE_DATABASE_PORT: ${SUKSUK_PRAISE_DATABASE_PORT:-5432}
    ports:
      - "${PORT:-3000}:3000"
    command: ["bundle", "exec", "puma", "-C", "config/puma.rb"]

volumes:
  postgres_data:
